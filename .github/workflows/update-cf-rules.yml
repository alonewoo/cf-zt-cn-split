name: Update Cloudflare Split Tunnel Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  generate:
    name: Generate Rules (Script A)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script A - Generate & Upload
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPO: ${{ secrets.REPO_NAME }}
          GITHUB_BRANCH: ${{ secrets.REPO_BRANCH }}
          VERBOSE: '1'
        run: python generate_rules.py

  apply:
    name: Apply Rules to Cloudflare (Script B)
    runs-on: ubuntu-latest
    needs: generate
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script B - Apply to Cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROFILE_ID: ${{ secrets.CF_PROFILE_ID }}
          MODE: ${{ secrets.MODE }}
          GITHUB_RAW_URL: ${{ secrets.RULES_FILE_URL }}
        run: python apply_rules.py
